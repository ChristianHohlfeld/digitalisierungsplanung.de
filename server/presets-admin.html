<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Preset Designer</title>
  <style>
    :root { color-scheme: dark; --bg:#06111d; --panel:#0a1a29; --field:#04101c; --line:#24435e; --text:#e7f2ff; --muted:#9cb3c9; --accent:#38bdf8; --ok:#34d399; --bad:#fb7185; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--text); font-family: "Segoe UI", system-ui, sans-serif; }
    main { width: min(1180px, calc(100% - 28px)); margin: 0 auto; padding: 22px 0 38px; }
    header, .toolbar, .actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    header { justify-content: space-between; margin-bottom: 14px; }
    h1, h2 { margin: 0; }
    h1 { font-size: 25px; }
    h2 { font-size: 15px; }
    a { color: var(--accent); text-decoration: none; font-weight: 800; }
    .workspace { display: grid; grid-template-columns: minmax(0, 1.08fr) minmax(360px, .92fr); gap: 14px; }
    .stack { display: grid; gap: 12px; align-content: start; }
    .panel { display: grid; gap: 12px; padding: 15px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel); }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    label { display: grid; gap: 6px; color: var(--muted); font-size: 12px; font-weight: 800; text-transform: uppercase; }
    input, select, textarea, button { border: 1px solid var(--line); border-radius: 6px; background: var(--field); color: var(--text); font: inherit; }
    input, select { width: 100%; height: 40px; padding: 0 10px; }
    textarea { width: 100%; min-height: 110px; padding: 10px; resize: vertical; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 12px; line-height: 1.45; }
    #snippet { min-height: 320px; }
    #definition { min-height: 410px; }
    button { min-height: 40px; padding: 0 13px; border-color: #27749a; background: #0a3b57; font-weight: 850; cursor: pointer; }
    button.secondary { border-color: var(--line); background: var(--field); }
    button.danger { border-color: #7f1d1d; background: #3f1018; color: #ffe4e6; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .toolbar { padding: 13px 15px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel); margin-bottom: 14px; }
    .toolbar label { min-width: 260px; flex: 1 1 300px; }
    .status { width: 100%; color: var(--muted); font-size: 13px; white-space: pre-wrap; }
    .ok { color: var(--ok); }
    .bad { color: var(--bad); }
    [hidden] { display: none !important; }
    @media (max-width: 820px) { .workspace, .grid { grid-template-columns: 1fr; } main { width: min(100% - 18px, 1180px); padding-top: 12px; } #snippet, #definition { min-height: 240px; } }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Preset Designer <small>v5.6.18</small></h1>
      <nav class="actions"><a href="/contract">Contract</a><a href="/events-admin.html">Event Designer</a></nav>
    </header>

    <section class="toolbar">
      <label>Admin-Secret<input id="secret" type="password" autocomplete="off" placeholder="REALTIME_ADMIN_SECRET"></label>
      <button id="reload" class="secondary" type="button">Neu laden</button>
      <div id="status" class="status">Nicht geladen</div>
    </section>

    <div class="workspace">
      <div class="stack">
        <section class="panel">
          <h2>DaisyUI-Snippet</h2>
          <textarea id="snippet" spellcheck="false" placeholder="DaisyUI-Beispiel hier einfügen"></textarea>
          <div class="grid">
            <label>Preset-ID<input id="presetId" placeholder="custom_mein_preset"></label>
            <label>Titel<input id="title" placeholder="Mein Preset"></label>
          </div>
          <label>Beschreibung<input id="description" placeholder="Kurze Beschreibung"></label>
          <div class="grid">
            <label>Kategorie<select id="category"></select></label>
            <label>Paket<select id="package"></select></label>
          </div>
          <div id="newCategory" class="grid" hidden>
            <label>Neue Kategorie-ID<input id="categoryId" placeholder="portal"></label>
            <label>Kategorie-Name<input id="categoryLabel" placeholder="Portal"></label>
          </div>
          <div id="newPackage" class="grid" hidden>
            <label>Neue Paket-ID<input id="packageId" placeholder="portal.pro"></label>
            <label>Paket-Name<input id="packageLabel" placeholder="Portal Pro"></label>
          </div>
          <div class="actions">
            <button id="parse" type="button">Definition erzeugen</button>
            <button id="clear" class="secondary" type="button">Neu</button>
          </div>
        </section>

        <section class="panel">
          <h2>Verwaltung</h2>
          <label>Gespeicherte Presets<select id="existingPreset"></select></label>
          <div class="grid">
            <label>Kategorien<select id="managedCategory"></select></label>
            <label>Pakete<select id="managedPackage"></select></label>
          </div>
          <div class="actions">
            <button id="deletePreset" class="danger" type="button">Preset löschen</button>
            <button id="deleteCategory" class="danger" type="button">Kategorie löschen</button>
            <button id="deletePackage" class="danger" type="button">Paket löschen</button>
          </div>
        </section>
      </div>

      <section class="panel">
        <h2>Contract-Definition</h2>
        <textarea id="definition" readonly spellcheck="false"></textarea>
        <label>Commit-Nachricht<input id="message" value="Update preset library"></label>
        <div class="actions">
          <button id="save" type="button">In Contract speichern</button>
          <button id="validate" class="secondary" type="button">Nur prüfen</button>
        </div>
      </section>
    </div>
  </main>

  <script>
    const ADMIN_SECRET_STORAGE_KEY = "digitalisierungsplanung.realtime.adminSecret";
    const PROTECTED_CATEGORY_IDS = new Set(["websuite-builder"]);
    const PROTECTED_PACKAGE_IDS = new Set(["core.process", "website.builder", "approval.compliance", "service.operations", "bi.analytics", "sales.crm", "knowledge.portal", "integration.automation"]);
    const el = id => document.getElementById(id);
    let library = null;
    let draft = null;

    function clone(value) { return JSON.parse(JSON.stringify(value)); }
    function authHeaders() { return { authorization: "Bearer " + el("secret").value.trim(), "content-type": "application/json" }; }
    function setStatus(message, type = "") { el("status").className = "status " + type; el("status").textContent = message; }
    function setDefinition(value) { draft = value ? clone(value) : null; el("definition").value = draft ? JSON.stringify(draft, null, 2) : ""; }
    function nextSort(items) { return Math.max(0, ...items.map(item => Number(item.sort) || 0)) + 10; }

    try { el("secret").value = localStorage.getItem(ADMIN_SECRET_STORAGE_KEY) || ""; } catch (_) {}
    el("secret").addEventListener("input", () => {
      try {
        const value = el("secret").value.trim();
        if (value) localStorage.setItem(ADMIN_SECRET_STORAGE_KEY, value);
        else localStorage.removeItem(ADMIN_SECRET_STORAGE_KEY);
      } catch (_) {}
    });

    function fillSelect(select, items, options = {}) {
      const selected = options.selected || select.value;
      select.innerHTML = "";
      if (options.emptyLabel) select.add(new Option(options.emptyLabel, ""));
      for (const item of items) select.add(new Option(item.label || item.title || item.id, item.id));
      if (options.newLabel) select.add(new Option(options.newLabel, "__new__"));
      select.value = [...select.options].some(option => option.value === selected) ? selected : select.options[0]?.value || "";
    }

    function renderCatalog() {
      if (!library) return;
      fillSelect(el("category"), library.categories, { selected: draft?.categoryId || "websuite-builder", newLabel: "+ Neue Kategorie" });
      fillSelect(el("package"), library.packages, { selected: draft?.packageIds?.[0] || "website.builder", newLabel: "+ Neues Paket" });
      fillSelect(el("managedCategory"), library.categories);
      fillSelect(el("managedPackage"), library.packages);
      fillSelect(el("existingPreset"), library.presets, { emptyLabel: "Neues Preset" });
      el("newCategory").hidden = el("category").value !== "__new__";
      el("newPackage").hidden = el("package").value !== "__new__";
      syncDeleteButtons();
    }

    function syncDeleteButtons() {
      const presetId = el("existingPreset").value;
      const categoryId = el("managedCategory").value;
      const packageId = el("managedPackage").value;
      el("deletePreset").disabled = !presetId;
      el("deleteCategory").disabled = !categoryId || PROTECTED_CATEGORY_IDS.has(categoryId) || library.presets.some(preset => preset.categoryId === categoryId);
      el("deletePackage").disabled = !packageId || PROTECTED_PACKAGE_IDS.has(packageId) || library.presets.some(preset => preset.packageIds.includes(packageId));
    }

    async function requestJson(url, options = {}) {
      const response = await fetch(url, { cache: "no-store", ...options });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(payload.error || `HTTP ${response.status}`);
      return payload;
    }

    async function loadCatalog() {
      setStatus("Lade Preset-Library...");
      const payload = await requestJson("/presets-admin/catalog", { headers: authHeaders() });
      library = payload.library;
      renderCatalog();
      setStatus(`${library.presets.length} eigene Presets, ${library.categories.length} Kategorie(n), ${library.packages.length} Paket(e).`, "ok");
    }

    function ensureCategory() {
      if (el("category").value !== "__new__") return el("category").value;
      const id = el("categoryId").value.trim();
      const label = el("categoryLabel").value.trim();
      if (!id || !label) throw new Error("Neue Kategorie braucht ID und Name.");
      if (library.categories.some(item => item.id === id)) throw new Error("Kategorie-ID ist bereits vergeben.");
      library.categories.push({ id, label, description: "", sort: nextSort(library.categories) });
      return id;
    }

    function ensurePackage() {
      if (el("package").value !== "__new__") return el("package").value;
      const id = el("packageId").value.trim();
      const label = el("packageLabel").value.trim();
      if (!id || !label) throw new Error("Neues Paket braucht ID und Name.");
      if (library.packages.some(item => item.id === id)) throw new Error("Paket-ID ist bereits vergeben.");
      library.packages.push({ id, label, category: "package", description: "", buyerValue: "", upsell: false, sort: nextSort(library.packages) });
      return id;
    }

    async function parseSnippet() {
      if (!library) throw new Error("Preset-Library ist nicht geladen.");
      const categoryId = ensureCategory();
      const packageId = ensurePackage();
      const payload = await requestJson("/presets-admin/parse", {
        method: "POST",
        headers: authHeaders(),
        body: JSON.stringify({
          snippet: el("snippet").value,
          id: el("presetId").value,
          title: el("title").value,
          description: el("description").value,
          categoryId,
          packageIds: [packageId]
        })
      });
      setDefinition(payload.preset);
      el("presetId").value = draft.id;
      el("title").value = draft.title;
      el("description").value = draft.description;
      renderCatalog();
      el("category").value = categoryId;
      el("package").value = packageId;
      setStatus(`Definition für ${draft.variant} erzeugt.`, "ok");
      return draft;
    }

    function currentDraft() {
      if (!draft) throw new Error("Zuerst eine Definition erzeugen oder ein Preset auswählen.");
      const next = clone(draft);
      next.id = el("presetId").value.trim() || next.id;
      next.title = el("title").value.trim() || next.title;
      next.description = el("description").value.trim();
      next.categoryId = ensureCategory();
      next.packageIds = [ensurePackage()];
      setDefinition(next);
      return next;
    }

    async function submitLibrary(validateOnly = false) {
      const payload = await requestJson(`/presets-admin/catalog${validateOnly ? "?validate=1" : ""}`, {
        method: "POST",
        headers: authHeaders(),
        body: JSON.stringify({ library, validateOnly, message: el("message").value })
      });
      if (validateOnly) {
        library = payload.library;
        renderCatalog();
        setStatus("Library ist vertragskonform.", "ok");
        return;
      }
      const message = payload.changed ? `Gespeichert und gepusht: ${payload.commit}` : "Keine Änderung.";
      await loadCatalog();
      setStatus(message, "ok");
    }

    async function savePreset() {
      if (el("snippet").value.trim()) await parseSnippet();
      const preset = currentDraft();
      const index = library.presets.findIndex(item => item.id === preset.id);
      if (index >= 0) library.presets[index] = preset;
      else library.presets.push(preset);
      await submitLibrary(false);
    }

    function clearForm() {
      setDefinition(null);
      el("snippet").value = "";
      el("presetId").value = "";
      el("title").value = "";
      el("description").value = "";
      el("existingPreset").value = "";
      renderCatalog();
    }

    el("category").addEventListener("change", () => { el("newCategory").hidden = el("category").value !== "__new__"; });
    el("package").addEventListener("change", () => { el("newPackage").hidden = el("package").value !== "__new__"; });
    el("managedCategory").addEventListener("change", syncDeleteButtons);
    el("managedPackage").addEventListener("change", syncDeleteButtons);
    el("existingPreset").addEventListener("change", () => {
      const preset = library.presets.find(item => item.id === el("existingPreset").value);
      if (!preset) { clearForm(); return; }
      setDefinition(preset);
      el("snippet").value = "";
      el("presetId").value = preset.id;
      el("title").value = preset.title;
      el("description").value = preset.description;
      renderCatalog();
      el("existingPreset").value = preset.id;
      syncDeleteButtons();
    });
    el("parse").onclick = () => parseSnippet().catch(error => setStatus(error.message, "bad"));
    el("save").onclick = () => savePreset().catch(error => setStatus(error.message, "bad"));
    el("validate").onclick = () => submitLibrary(true).catch(error => setStatus(error.message, "bad"));
    el("reload").onclick = () => loadCatalog().catch(error => setStatus(error.message, "bad"));
    el("clear").onclick = clearForm;
    el("deletePreset").onclick = () => {
      library.presets = library.presets.filter(item => item.id !== el("existingPreset").value);
      clearForm();
      submitLibrary(false).catch(error => setStatus(error.message, "bad"));
    };
    el("deleteCategory").onclick = () => {
      library.categories = library.categories.filter(item => item.id !== el("managedCategory").value);
      renderCatalog();
      submitLibrary(false).catch(error => setStatus(error.message, "bad"));
    };
    el("deletePackage").onclick = () => {
      library.packages = library.packages.filter(item => item.id !== el("managedPackage").value);
      renderCatalog();
      submitLibrary(false).catch(error => setStatus(error.message, "bad"));
    };

    loadCatalog().catch(error => setStatus(error.message, "bad"));
  </script>
</body>
</html>
