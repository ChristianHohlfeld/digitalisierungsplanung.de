<!doctype html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DaisyUI Preset Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; min-height: 100vh; background: #020617; color: #e5eefb; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .admin-shell { width: min(1380px, calc(100% - 28px)); margin: 0 auto; padding: 22px 0 40px; }
    .admin-top { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
    .admin-title { margin: 0; font-size: clamp(24px, 4vw, 40px); line-height: 1; font-weight: 900; }
    .admin-subtitle { margin: 6px 0 0; color: #93a4b8; }
    .admin-layout { display: grid; grid-template-columns: minmax(340px, 520px) minmax(0, 1fr); gap: 16px; align-items: start; }
    .admin-panel { display: grid; gap: 12px; padding: 16px; border: 1px solid #1d3551; border-radius: 18px; background: #07111f; box-shadow: 0 20px 55px rgba(0,0,0,.28); }
    .admin-panel-title { margin: 0; color: #bfdbfe; font-size: 15px; font-weight: 900; text-transform: uppercase; letter-spacing: .08em; }
    .admin-field { display: grid; gap: 6px; color: #aab9ca; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; }
    .admin-field > input, .admin-field > select, .admin-field > textarea { width: 100%; border: 1px solid #284767; border-radius: 10px; background: #020b16; color: #e5eefb; font: inherit; }
    .admin-field > input, .admin-field > select { min-height: 42px; padding: 0 12px; }
    .admin-field > textarea { min-height: 190px; padding: 12px; resize: vertical; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; line-height: 1.45; text-transform: none; letter-spacing: 0; }
    .admin-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .admin-status { min-height: 22px; color: #9fb3c8; white-space: pre-wrap; font-size: 13px; }
    .admin-status[data-kind="ok"] { color: #86efac; }
    .admin-status[data-kind="bad"] { color: #fda4af; }
    .admin-preview { width: 100%; min-height: 440px; border: 1px solid #284767; border-radius: 18px; background: white; overflow: hidden; }
    .admin-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    @media (max-width: 940px) { .admin-layout, .admin-grid { grid-template-columns: 1fr; } .admin-top { display: grid; } }
  </style>
</head>
<body>
  <main class="admin-shell">
    <header class="admin-top">
      <div>
        <h1 class="admin-title">DaisyUI Preset Admin</h1>
        <p class="admin-subtitle">Echte DaisyUI Templates nach offizieller CDN-Doku: themes.css + daisyui@5 + @tailwindcss/browser@4.</p>
      </div>
      <nav class="admin-actions"><a class="btn btn-ghost" href="/contract">Contract</a><a class="btn btn-ghost" href="/events-admin.html">Events</a></nav>
    </header>
    <section class="admin-panel" style="margin-bottom:16px">
      <div class="admin-grid">
        <label class="admin-field">Admin-Secret<input id="secret" type="password" autocomplete="off" placeholder="REALTIME_ADMIN_SECRET"></label>
        <label class="admin-field">Commit-Nachricht<input id="message" value="Update real DaisyUI preset library"></label>
      </div>
      <div class="admin-actions"><button id="reload" class="btn btn-primary" type="button">Katalog laden</button><button id="validate" class="btn" type="button">Library prüfen</button><button id="save" class="btn btn-success" type="button">Custom speichern</button><button id="deletePreset" class="btn btn-error" type="button">Custom löschen</button></div>
      <div id="status" class="admin-status">Nicht geladen</div>
    </section>
    <div class="admin-layout">
      <section class="admin-panel">
        <h2 class="admin-panel-title">Preset Explorer</h2>
        <label class="admin-field">Preset auswählen<select id="existingPreset"></select></label>
        <div class="admin-actions"><button id="loadPreset" class="btn" type="button">Laden</button><button id="duplicatePreset" class="btn" type="button">Als Custom duplizieren</button><button id="newButton" class="btn" type="button">Neuer Button</button></div>
        <div class="admin-grid"><label class="admin-field">ID<input id="presetId" placeholder="custom_button"></label><label class="admin-field">Variante<input id="variant" readonly></label></div>
        <label class="admin-field">Titel<input id="title" placeholder="Mein DaisyUI Preset"></label>
        <label class="admin-field">Beschreibung<input id="description" placeholder="Kurzbeschreibung"></label>
        <div class="admin-grid"><label class="admin-field">Kategorie<select id="category"></select></label><label class="admin-field">Paket<select id="package"></select></label></div>
        <label class="admin-field">Original DaisyUI HTML Template<textarea id="snippet" spellcheck="false" placeholder="DaisyUI HTML aus packages/docs/src/routes/(routes)/components/... einfügen"></textarea></label>
        <div class="admin-actions"><button id="parse" class="btn btn-primary" type="button">Snippet einlesen</button></div>
        <label class="admin-field">Kanonische Preset-Definition<textarea id="definition" spellcheck="false"></textarea></label>
      </section>
      <section class="admin-panel"><h2 class="admin-panel-title">Echte DaisyUI Vorschau</h2><iframe id="preview" class="admin-preview" title="DaisyUI Preset Preview" sandbox="allow-scripts"></iframe></section>
    </div>
  </main>
  <script>
    window.DaisyPresetRenderer = (() => {
      const version = "5";
      const cssUrl = "https://cdn.jsdelivr.net/npm/daisyui@5";
      const themesCssUrl = "https://cdn.jsdelivr.net/npm/daisyui@5/themes.css";
      const tailwindBrowserUrl = "https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4";
      const escapeHtml = value => String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
      const valueAt = (source, path) => String(path || "").split(".").filter(Boolean).reduce((cursor, part) => cursor && typeof cursor === "object" ? cursor[part] : undefined, source);
      const renderTemplateHtml = (template, data = {}) => String(template?.html || template || "").replace(/\{\{\s*([^}]+?)\s*\}\}/g, (_, expression) => {
        const [rawPath, ...fallbackParts] = String(expression).split("|");
        const fallback = fallbackParts.join("|").trim();
        const value = valueAt(data, rawPath.trim());
        return escapeHtml(value === undefined || value === null || value === "" ? fallback : value);
      });
      const renderPresetHtml = (preset, data = preset?.data || {}) => renderTemplateHtml(preset?.template || preset?.components?.[0]?.template || "", data);
      const shellHtml = (body, opts = {}) => `<!doctype html><html lang="de" data-theme="${escapeHtml(opts.theme || "light")}"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><link href="${themesCssUrl}" rel="stylesheet" type="text/css"><link href="${cssUrl}" rel="stylesheet" type="text/css"><script src="${tailwindBrowserUrl}"><\/script><style>body{margin:0;padding:24px;background:var(--color-base-200,#f5f5f5);font-family:ui-sans-serif,system-ui,sans-serif}.daisy-preview-root{display:grid;justify-items:center;gap:20px;width:min(100%,1100px);margin:0 auto}.daisy-preview-root>*{max-width:100%}</style></head><body><main class="daisy-preview-root">${body}</main></body></html>`;
      const renderInto = (target, preset, opts = {}) => { const html = renderPresetHtml(preset, opts.data || preset?.data || {}); if (target?.tagName === "IFRAME") target.srcdoc = shellHtml(html, opts); else if (target) target.innerHTML = html; return html; };
      const exportHtml = (presets, opts = {}) => shellHtml((Array.isArray(presets) ? presets : [presets]).filter(Boolean).map(preset => renderPresetHtml(preset, preset.data)).join("\n"), opts);
      return { version, cssUrl, themesCssUrl, tailwindBrowserUrl, escapeHtml, renderTemplateHtml, renderPresetHtml, renderInto, shellHtml, exportHtml };
    })();

    const STORAGE_KEY = "digitalisierungsplanung.realtime.adminSecret";
    const el = id => document.getElementById(id);
    let library = null, allPresets = [], draft = null;
    const clone = value => JSON.parse(JSON.stringify(value));
    const isObject = value => Boolean(value) && typeof value === "object" && !Array.isArray(value);
    const authHeaders = () => ({ authorization: "Bearer " + el("secret").value.trim(), "content-type": "application/json" });
    const setStatus = (text, kind = "") => { el("status").textContent = text; el("status").dataset.kind = kind; };
    const showError = error => setStatus(error?.message || String(error), "bad");
    try { el("secret").value = localStorage.getItem(STORAGE_KEY) || ""; } catch (_) {}
    el("secret").addEventListener("input", () => { try { const value = el("secret").value.trim(); value ? localStorage.setItem(STORAGE_KEY, value) : localStorage.removeItem(STORAGE_KEY); } catch (_) {} });
    async function requestJson(url, options = {}) { const response = await fetch(url, { cache: "no-store", ...options }); const payload = await response.json().catch(() => ({})); if (!response.ok) throw new Error(payload.error || `HTTP ${response.status}`); return payload; }
    function fillSelect(select, items, selected = "") { select.innerHTML = ""; for (const item of items) select.add(new Option(item.label || item.title || item.id, item.id)); if (selected && [...select.options].some(option => option.value === selected)) select.value = selected; }
    function fillPresets() { const select = el("existingPreset"); select.innerHTML = ""; select.add(new Option("Preset auswählen", "")); const groups = new Map([["Built-ins", []], ["Custom", []]]); allPresets.forEach(preset => groups.get(preset._custom ? "Custom" : "Built-ins").push(preset)); for (const [label, presets] of groups) { if (!presets.length) continue; const group = document.createElement("optgroup"); group.label = label; presets.forEach(preset => group.appendChild(new Option(`${preset.title} (${preset.variant})`, preset.id))); select.appendChild(group); } }
    async function loadCatalog() { setStatus("Lade Katalog..."); const [catalogPayload, contractPayload] = await Promise.all([requestJson("/presets-admin/catalog", { headers: authHeaders() }), requestJson("/contract")]); library = catalogPayload.library; const libraryIds = new Set(library.presets.map(preset => preset.id)); allPresets = [...(contractPayload.presets || []).filter(preset => !libraryIds.has(preset.id)).map(preset => ({ ...preset, _custom: false })), ...library.presets.map(preset => ({ ...preset, _custom: true }))]; fillSelect(el("category"), library.categories, "websuite-builder"); fillSelect(el("package"), library.packages, "website.builder"); fillPresets(); setStatus(`${allPresets.length} Presets geladen, davon ${library.presets.length} Custom.`, "ok"); if (!draft && allPresets.length) setDraft(allPresets[0]); }
    function syncFields() { if (!draft) return; el("presetId").value = draft.id || ""; el("variant").value = draft.variant || ""; el("title").value = draft.title || ""; el("description").value = draft.description || ""; el("snippet").value = draft.template?.html || ""; if ([...el("category").options].some(option => option.value === draft.categoryId)) el("category").value = draft.categoryId; if ([...el("package").options].some(option => option.value === draft.packageIds?.[0])) el("package").value = draft.packageIds[0]; el("deletePreset").disabled = !draft.id || !library?.presets.some(preset => preset.id === draft.id); }
    function setDraft(value) { draft = value ? clone(value) : null; if (draft) { delete draft._custom; delete draft._builtin; if (draft.components?.[0]?.template && !draft.template) draft.template = clone(draft.components[0].template); } el("definition").value = draft ? JSON.stringify(draft, null, 2) : ""; syncFields(); DaisyPresetRenderer.renderInto(el("preview"), draft, { theme: "light" }); }
    function normalizeCustomId(value) { const slug = String(value || "custom_preset").toLowerCase().normalize("NFKD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9_]+/g, "_").replace(/^_+|_+$/g, ""); const prefixed = slug.startsWith("custom_") ? slug : "custom_" + slug; return /^custom_[a-z0-9_]{1,56}$/.test(prefixed) ? prefixed.slice(0, 63) : "custom_preset"; }
    function uniqueCustomId(seed) { const base = normalizeCustomId(seed); const taken = new Set(library?.presets.map(preset => preset.id) || []); if (!taken.has(base)) return base; let n = 2; while (taken.has(`${base.slice(0, 55)}_${n}`)) n += 1; return `${base.slice(0, 55)}_${n}`; }
    function definitionFromText() { const text = el("definition").value.trim(); if (!text) return null; const value = JSON.parse(text); if (!isObject(value)) throw new Error("Definition muss ein JSON-Objekt sein."); return value; }
    function currentDraft() { const base = definitionFromText() || draft; if (!base) throw new Error("Kein Preset geladen."); const next = clone(base); next.id = normalizeCustomId(el("presetId").value || next.id); next.variant = el("variant").value || next.variant; next.title = el("title").value.trim() || next.title || "Preset"; next.description = el("description").value.trim(); next.categoryId = el("category").value || "websuite-builder"; next.packageIds = [el("package").value || "website.builder"]; next.template = { source: "daisyui", version: "5", docsPath: next.template?.docsPath || "", html: el("snippet").value.trim() || next.template?.html || "" }; if (!isObject(next.data)) next.data = {}; setDraft(next); return next; }
    function newButton() { if (!library) throw new Error("Katalog zuerst laden."); setDraft({ id: uniqueCustomId("custom_button"), variant: "button", title: "Button", description: "Original DaisyUI Button.", categoryId: "websuite-builder", packageIds: ["core.process"], template: { source: "daisyui", version: "5", docsPath: "packages/docs/src/routes/(routes)/components/button/+page.md", html: '<button class="btn btn-primary">{{ label | Button }}</button>' }, data: { label: "Button", clicked: false, clickedAt: 0 } }); }
    async function parseSnippet() { if (!library) throw new Error("Katalog zuerst laden."); const payload = await requestJson("/presets-admin/parse", { method: "POST", headers: authHeaders(), body: JSON.stringify({ snippet: el("snippet").value, id: el("presetId").value, title: el("title").value, description: el("description").value, categoryId: el("category").value, packageIds: [el("package").value] }) }); setDraft(payload.preset); setStatus(`Snippet als ${payload.preset.variant} eingelesen.`, "ok"); }
    async function submit(validateOnly = false) { if (!library) throw new Error("Katalog zuerst laden."); const preset = currentDraft(); const index = library.presets.findIndex(item => item.id === preset.id); if (index >= 0) library.presets[index] = preset; else library.presets.push(preset); const payload = await requestJson(`/presets-admin/catalog${validateOnly ? "?validate=1" : ""}`, { method: "POST", headers: authHeaders(), body: JSON.stringify({ library, validateOnly, message: el("message").value }) }); if (validateOnly) { library = payload.library; setStatus("Library ist vertragskonform.", "ok"); return; } setStatus(payload.changed ? `Gespeichert: ${payload.commit}` : "Keine Änderung.", "ok"); await loadCatalog(); }
    async function deleteCurrentPreset() { if (!library || !draft) return; library.presets = library.presets.filter(preset => preset.id !== draft.id); await requestJson("/presets-admin/catalog", { method: "POST", headers: authHeaders(), body: JSON.stringify({ library, message: "Delete custom DaisyUI preset" }) }); setDraft(null); await loadCatalog(); }
    el("reload").onclick = () => loadCatalog().catch(showError);
    el("validate").onclick = () => submit(true).catch(showError);
    el("save").onclick = () => submit(false).catch(showError);
    el("deletePreset").onclick = () => deleteCurrentPreset().catch(showError);
    el("parse").onclick = () => parseSnippet().catch(showError);
    el("newButton").onclick = () => { try { newButton(); } catch (error) { showError(error); } };
    el("loadPreset").onclick = () => { const preset = allPresets.find(item => item.id === el("existingPreset").value); if (preset) setDraft(preset); };
    el("duplicatePreset").onclick = () => { const preset = allPresets.find(item => item.id === el("existingPreset").value); if (!preset) return; const copy = clone(preset); copy.id = uniqueCustomId(copy.id.replace(/^builtin_daisy_/, "custom_")); copy.title = `${copy.title || "Preset"} Kopie`; setDraft(copy); };
  </script>
</body>
</html>
