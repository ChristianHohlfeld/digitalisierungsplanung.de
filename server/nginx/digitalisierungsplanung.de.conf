server {
    listen 443 ssl http2;
    server_name digitalisierungsplanung.de;

    root /var/www/digitalisierungsplanung.de;
    index index.html;
    server_tokens off;
    etag off;
    if_modified_since off;

    ssl_certificate     /etc/letsencrypt/live/digitalisierungsplanung.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/digitalisierungsplanung.de/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Cache-Control "no-store, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    location = / {
        try_files /index.html =404;
    }

    location = /index.html {
        try_files /index.html =404;
    }

    location = /state.html {
        try_files /state.html =404;
    }

    location = /manifest.webmanifest {
        try_files /manifest.webmanifest =404;
    }

    location = /disable-sw.js {
        try_files /disable-sw.js =404;
    }

    location = /release-version.js {
        try_files /release-version.js =404;
    }

    location = /sw.js {
        add_header Cache-Control "no-store, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header X-Content-Type-Options nosniff always;
        try_files /sw.js =404;
    }

    location ^~ /assets/ {
        try_files $uri =404;
    }

    location / {
        return 404;
    }
}

server {
    listen 80;
    server_name digitalisierungsplanung.de;
    server_tokens off;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
