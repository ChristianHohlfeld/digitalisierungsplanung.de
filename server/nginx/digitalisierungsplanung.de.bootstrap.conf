server {
    listen 80;
    server_name digitalisierungsplanung.de;

    root /var/www/digitalisierungsplanung.de;
    server_tokens off;
    etag off;
    if_modified_since off;

    add_header Cache-Control "no-store, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    add_header X-Content-Type-Options nosniff always;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    location = / {
        try_files /index.html =404;
    }

    location = /index.html {
        try_files /index.html =404;
    }

    location = /state.html {
        try_files /state.html =404;
    }

    location = /manifest.webmanifest {
        try_files /manifest.webmanifest =404;
    }

    location = /disable-sw.js {
        try_files /disable-sw.js =404;
    }

    location = /release-version.js {
        try_files /release-version.js =404;
    }

    location = /sw.js {
        add_header Cache-Control "no-store, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header X-Content-Type-Options nosniff always;
        try_files /sw.js =404;
    }

    location ^~ /assets/ {
        try_files $uri =404;
    }

    location / {
        return 404;
    }
}
