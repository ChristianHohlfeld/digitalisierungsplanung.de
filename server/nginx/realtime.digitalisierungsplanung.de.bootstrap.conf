server {
    listen 80;
    server_name realtime.digitalisierungsplanung.de;

    server_tokens off;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    location / {
        return 204;
    }
}
