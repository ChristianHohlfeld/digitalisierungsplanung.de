<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Realtime Admin</title>
  <style>
    :root { color-scheme: dark; --bg:#06111d; --panel:#0a1a29; --field:#04101c; --line:#24435e; --text:#e7f2ff; --muted:#9cb3c9; --accent:#38bdf8; --ok:#34d399; --warn:#facc15; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--text); font-family: "Segoe UI", system-ui, sans-serif; }
    main { width: min(1120px, calc(100% - 28px)); margin: 0 auto; padding: 24px 0 38px; }
    header { display: flex; justify-content: space-between; align-items: end; gap: 14px; flex-wrap: wrap; margin-bottom: 16px; }
    h1, h2, p { margin: 0; }
    h1 { font-size: clamp(25px, 4vw, 38px); line-height: 1.05; }
    h2 { font-size: 15px; }
    .muted { color: var(--muted); }
    .release { color: var(--muted); font-size: 13px; text-align: right; }
    .grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 12px; }
    .tool { min-height: 170px; display: grid; align-content: space-between; gap: 18px; padding: 16px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel); color: inherit; text-decoration: none; }
    .tool:hover, .tool:focus-visible { border-color: var(--accent); outline: none; box-shadow: 0 0 0 1px rgba(56, 189, 248, .4); }
    .tool strong { display: block; font-size: 18px; }
    .tool span { display: block; margin-top: 7px; color: var(--muted); font-size: 13px; line-height: 1.4; }
    .kind { width: fit-content; padding: 5px 8px; border: 1px solid rgba(56, 189, 248, .35); border-radius: 999px; color: #bae6fd; background: rgba(56, 189, 248, .08); font-size: 11px; font-weight: 850; text-transform: uppercase; }
    .section { margin-top: 16px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel); overflow: hidden; }
    details summary { cursor: pointer; padding: 14px 16px; font-weight: 850; color: var(--text); }
    .endpoints { width: 100%; border-collapse: collapse; font-size: 13px; }
    .endpoints th, .endpoints td { padding: 10px 12px; border-top: 1px solid rgba(36, 67, 94, .78); text-align: left; vertical-align: top; }
    .endpoints th { color: var(--muted); font-size: 11px; text-transform: uppercase; }
    .endpoints code { color: #dff7ff; }
    .surface { color: var(--warn); font-weight: 800; }
    .empty { padding: 16px; color: var(--muted); }
    a { color: var(--accent); }
    @media (max-width: 980px) { .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } .release { text-align: left; } }
    @media (max-width: 560px) { main { width: min(100% - 18px, 1120px); padding-top: 14px; } .grid { grid-template-columns: 1fr; } .tool { min-height: 132px; } .endpoints th:nth-child(4), .endpoints td:nth-child(4) { display: none; } }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Realtime Admin</h1>
        <p class="muted">Ein Einstieg für Events, Presets, Tests, Contract und Systemstatus.</p>
      </div>
      <div id="release" class="release">Lade Routen...</div>
    </header>
    <section id="tools" class="grid" aria-label="Server Tools"></section>
    <section class="section">
      <details>
        <summary>Technische Endpunkte</summary>
        <div id="endpointWrap"></div>
      </details>
    </section>
  </main>
  <script>
    const toolsEl = document.getElementById("tools");
    const releaseEl = document.getElementById("release");
    const endpointWrapEl = document.getElementById("endpointWrap");

    function text(value) {
      return String(value || "");
    }

    function renderTools(tools) {
      toolsEl.innerHTML = "";
      for (const tool of tools) {
        const link = document.createElement("a");
        link.className = "tool";
        link.href = text(tool.href || "#");
        const body = document.createElement("div");
        const title = document.createElement("strong");
        title.textContent = text(tool.label || tool.id);
        const intent = document.createElement("span");
        intent.textContent = text(tool.intent);
        body.append(title, intent);
        const kind = document.createElement("div");
        kind.className = "kind";
        kind.textContent = text(tool.kind || "tool");
        link.append(body, kind);
        toolsEl.appendChild(link);
      }
    }

    function renderEndpoints(endpoints) {
      if (!endpoints.length) {
        endpointWrapEl.innerHTML = '<div class="empty">Keine Endpunkte geladen.</div>';
        return;
      }
      const table = document.createElement("table");
      table.className = "endpoints";
      table.innerHTML = "<thead><tr><th>Methode</th><th>Route</th><th>Bereich</th><th>Zweck</th></tr></thead>";
      const body = document.createElement("tbody");
      for (const endpoint of endpoints) {
        const row = document.createElement("tr");
        const method = document.createElement("td");
        method.textContent = text(endpoint.method);
        const path = document.createElement("td");
        const code = document.createElement("code");
        code.textContent = text(endpoint.path);
        path.appendChild(code);
        const surface = document.createElement("td");
        surface.className = "surface";
        surface.textContent = text(endpoint.surface);
        const description = document.createElement("td");
        description.textContent = text(endpoint.description || endpoint.label);
        row.append(method, path, surface, description);
        body.appendChild(row);
      }
      table.appendChild(body);
      endpointWrapEl.replaceChildren(table);
    }

    async function loadRoutes() {
      const response = await fetch("/admin/routes", { cache: "no-store" });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(payload.error || "Routen konnten nicht geladen werden.");
      renderTools(Array.isArray(payload.tools) ? payload.tools : []);
      renderEndpoints(Array.isArray(payload.endpoints) ? payload.endpoints : []);
      const release = payload.release || {};
      releaseEl.textContent = release.releaseId
        ? `${release.releaseId} / ${release.deployedCommit || release.sourceCommit || "unknown"}`
        : "Routen geladen";
    }

    loadRoutes().catch(error => {
      toolsEl.innerHTML = "";
      endpointWrapEl.innerHTML = '<div class="empty"></div>';
      endpointWrapEl.querySelector(".empty").textContent = error.message;
      releaseEl.textContent = "Fehler";
    });
  </script>
</body>
</html>
