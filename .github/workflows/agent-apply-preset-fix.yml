name: Agent apply preset fix

on:
  push:
    branches: [agent/embed-preset-assets]
    paths:
      - .github/agent/apply-preset-fix.py
      - .github/workflows/agent-apply-preset-fix.yml

permissions:
  contents: write

jobs:
  apply-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/embed-preset-assets
          fetch-depth: 0
      - name: Apply source changes
        run: python .github/agent/apply-preset-fix.py
      - name: Remove temporary files
        run: |
          rm -rf .github/preset-fix-payload .github/agent
          rm -f .github/workflows/agent-diagnose-preset-render.yml .github/workflows/agent-apply-preset-fix.yml
      - name: Push source changes
        run: |
          git config user.name "Preset Render Fix"
          git config user.email "preset-render-fix@digitalisierungsplanung.de"
          git add -A
          git commit -m "Render canonical preset snippets everywhere"
          git push origin HEAD:agent/embed-preset-assets
