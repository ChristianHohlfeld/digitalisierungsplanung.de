name: Update README screenshots

on:
  workflow_dispatch:

concurrency:
  group: readme-screenshots
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-readme-screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Regenerate README screenshots from app
        run: npm run screenshots:readme
      - name: Commit updated screenshots
        run: |
          if git diff --quiet -- README.md assets/screenshots; then
            echo "README screenshots are current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/screenshots
          git commit -m "Update README screenshots [skip ci]"
          git push origin HEAD:main
