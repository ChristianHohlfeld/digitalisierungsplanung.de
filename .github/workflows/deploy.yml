name: Deploy static site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run smoke tests
        run: npm test

  deploy:
    needs: smoke
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Stamp service worker version
        run: node scripts/write-sw-version.mjs
        env:
          SW_VERSION: gh-${{ github.run_number }}.${{ github.run_attempt }}-${{ github.sha }}
          SW_BUILT_AT: ${{ github.event.head_commit.timestamp }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4

  update-readme-screenshots:
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Regenerate README screenshots from app
        run: npm run screenshots:readme
      - name: Commit updated screenshots
        run: |
          if git diff --quiet -- README.md assets/screenshots; then
            echo "README screenshots are current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/screenshots
          git commit -m "Update README screenshots [skip ci]"
          git push origin HEAD:main
