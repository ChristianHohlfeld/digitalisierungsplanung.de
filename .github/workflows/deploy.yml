name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run full contract tests
        run: npm run test:full
      - name: Bump service worker deploy stamp
        if: github.ref == 'refs/heads/main'
        env:
          SW_VERSION: deploy-${{ github.run_number }}-${{ github.run_attempt }}
        run: |
          SW_BUILT_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")" node scripts/write-sw-version.mjs
          if git diff --quiet -- sw-version.js; then
            echo "Service worker deploy stamp is current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sw-version.js
          git commit -m "Bump service worker deploy stamp [skip ci]"
          git push origin HEAD:main
