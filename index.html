    function isBoundaryExitState(state) {

      if (outputBoundaryFlowForState(parent, state)) return true;

      if (!state) return null;

      const label = entry.title || "Next";
      const boundary = boundaryConfigFor(state);
      const triggerType = normalizeTransitionTriggerType({ triggerType: boundary.entryTriggerType || "button" });

        label,
        triggerType,
        triggerEvent: boundary.entryTriggerEvent || ""

        from: state.id,
        to: entry.id,
        label,
        condition: String(boundary.entryCondition || ""),

    function combineRuntimeTransitions(...groups) {

    function inferVariables(m) {

    function defaultValueFor(v) {

    function variableMap() {

    function sanitizeContext(vars = inferVariables(model)) {

    function ensureContext(vars) {

    function sanitizeValue(value, v) {

    function sanitizeNumericInput(value, v, opts = {}) {

        if (value === null || value === undefined) return false;

      const op = m[2];
      const right = coerceValue(m[3]);

      const value = write?.value ?? readValueAtPath(context, target);

        dataSourceResultBelongsToEntry(currentResult, meta);

    async function fetchJsonWithTimeout(url, timeoutMs) {
      const controller = new AbortController();

      } finally {

          const data = selected === undefined ? null : selected;

          const write = writeDataSourceResult(source, dataSourceResult({

            status: "success",
            loading: false,
            done: true,
            ok: true,

      const runtimeCurrent = resolveRuntimeTarget(current, null);
      if (runtimeCurrent !== current && findState(runtimeCurrent)) current = runtimeCurrent;
      syncRuntimeCurrent("runtime", true);
      const s = stateById(current);
      if (!s) {
        notifyRuntime();
        return;
      }
      const transitions = outgoing(s.id);
      const automaticTransitions = transitions.filter(t => ["auto", "timer"].includes(transitionTriggerType(t)));
      const actionTransitions = runtimeOrderActionTransitionsForState(s, transitions.filter(transitionIsButtonAction));
      const guardTransitions = transitions.filter(t => !["auto", "timer"].includes(transitionTriggerType(t)));
      scheduleAutomaticContinuation(s.id, stateFetchIsLoading(s) ? [] : automaticTransitions);
      const defaultActionId = defaultTransitionId(actionTransitions);
      if (blockedTransitionId && !guardTransitions.some(t => t.id === blockedTransitionId)) blockedTransitionId = null;
      const vars = inferVariables({ transitions: guardTransitions });
      ensureContext(vars);

      syncRuntimeAppName();
      const statePill = document.getElementById("statePill");
      if (statePill) statePill.textContent = current;

      const runtimeViewStateChanged = lastRenderedStateId !== s.id;
      lastRenderedStateId = s.id;
      if (runtimeViewStateChanged) {
        const scrollRoot = document.scrollingElement || document.documentElement;
        if (scrollRoot) {
          scrollRoot.scrollTop = 0;
          scrollRoot.scrollLeft = 0;
        }
        if (document.body) {
          document.body.scrollTop = 0;
          document.body.scrollLeft = 0;
        }
        window.scrollTo(0, 0);
      }
      const widgetScreen = runtimeStateUsesWidgetScreen(s);
      const hideStateTitle = widgetScreen && normalizeComponents(s.components).length === 1;
      const screen = document.getElementById("screen");
      screen.className = widgetScreen ? "screen widget-screen" : "screen";
      const activeValidation = runtimeValidation?.stateId === s.id ? runtimeValidation : null;
      if (activeValidation) screen.classList.add("validation-failed");
      screen.innerHTML = "";

      if (!hideStateTitle) {
        const h1 = document.createElement("h1");
        h1.textContent = renderLiteralText(s.title || s.id);
        screen.appendChild(h1);
      }
      const claimedActionTransitionIds = runtimeClaimedTransitionIdsForState(s, actionTransitions);
      renderActiveStateComponents(screen, activeStateChain(s), {
        activeStateId: s.id,
        actionTransitions,
        defaultActionId
      });


      if (vars.length) {
        const controls = document.createElement("div");
        controls.className = "controls";
        controls.innerHTML = `<h2>Eingaben</h2>`;
        for (const v of vars) {
          if (readValueAtPath(context, v.name) === undefined) {
            runtimeSet(v.name, defaultValueFor(v), { source: "input-default", notify: false, eventName: "change." + normalizeContextPath(v.name, "") });
          }
          const row = document.createElement("div");
          row.className = "field";
          const label = document.createElement("label");
          label.className = "field-label";
          label.textContent = v.name;
          const input = document.createElement("input");
          let control = input;
          if (v.type === "number") {
            input.type = "text";
            input.className = "typed-input";
            input.inputMode = v.kind === "int" ? "numeric" : "decimal";
            input.value = context[v.name];
            input.onkeydown = submitOnEnter;
            input.oninput = () => {
              const nextValue = sanitizeNumericInput(input.value, v);
              runtimeSet(v.name, nextValue, { source: "input" });
              input.value = context[v.name];
              input.classList.toggle("invalid", !isValidValue(context[v.name], v));
              updateActionButtons();
              refreshBlockedValidation();
              notifyRuntime();
            };
          } else if (v.type === "text") {
            input.type = "text";
            input.className = "typed-input";
            input.value = context[v.name];
            input.onkeydown = submitOnEnter;
            input.oninput = () => {
              runtimeSet(v.name, String(input.value ?? ""), { source: "input" });
              updateActionButtons();
              refreshBlockedValidation();
              notifyRuntime();
            };
          } else {
            input.type = "checkbox";
            input.checked = Boolean(context[v.name]);
            const toggle = document.createElement("label");
            toggle.className = "switch";
            const track = document.createElement("span");
            track.className = "switch-track";
            const value = document.createElement("span");
            value.className = "switch-value";
            const updateValue = () => { value.textContent = input.checked ? "On" : "Off"; };
            input.onchange = () => {
              runtimeSet(v.name, input.checked, { source: "input" });
              updateValue();
              updateActionButtons();
              refreshBlockedValidation();
              notifyRuntime();
            };
            updateValue();
            toggle.append(input, track, value);
            control = toggle;
          }
          row.append(label, control);
          controls.appendChild(row);
        }
        screen.appendChild(controls);
      }

      const actions = document.createElement("div");
      actions.className = "actions";
      for (const t of actionTransitions) {
        if (claimedActionTransitionIds.has(t.id)) continue;
        actions.appendChild(createTransitionActionElement(t, defaultActionId));
      }
      if (actions.childElementCount) screen.appendChild(actions);
      applyTabOrderAndFocus(screen);

      notifyRuntime();
    }

    function updateActionButtons() {
      for (const button of document.querySelectorAll("[data-transition-id]")) {
        const t = model.transitions.find(item => item.id === button.dataset.transitionId);
        if (t) button.disabled = false;
      }
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"]/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[ch]));
    }

    if (!IS_STANDALONE_EXPORT) window.addEventListener("message", evt => {
      const data = evt.data || {};
      if (data.type === "STATE_BLUEPRINT_RUNTIME_CONTROL") {
        setRuntimePaused(Boolean(data.paused));
        return;
      }
      if (data.type !== "STATE_BLUEPRINT_MODEL") return;
      const previousModel = model;
      const nextModel = normalizeModel(JSON.parse(JSON.stringify(data.model)));
      const changedTargets = changedDataSourceTargets(previousModel, nextModel);
      model = nextModel;
      suppressNextFocus = Boolean(data.preserveFocus);
      const hasHost = hasHostWindow();
      if (!hasHost) saveModel();
      const oldContext = context;
      pruneRemovedStateDataDefaults(previousModel, nextModel, oldContext);
      context = { ...defaultContext(model), ...oldContext };
      if (changedTargets.length) resetDataSourceContextTargets(changedTargets);
      if (data.reset) context = defaultContext(model);
      else applyChangedStateDataContract(previousModel, nextModel, context);
      setRuntimePaused(Boolean(data.paused), { render: false, notify: false });
      const requestedStart = typeof data.startStateId === "string" && findState(data.startStateId) ? data.startStateId : null;
      const entered = Boolean(requestedStart || data.reset || !findState(current));
      if (entered) {
        current = requestedStart || model.initial;
        syncRuntimeCurrent(data.reset ? "reset" : "host", true);
        stateActivationId += 1;
        logLines = [];
        transitionToNotify = null;
        blockedTransitionId = null;
        runtimeValidation = null;
      }
      runCurrentStateEntryEffects({ fetch: entered || currentDataSourceTargetChanged(changedTargets) });
      render();
    });

    if (!IS_STANDALONE_EXPORT) window.addEventListener("storage", evt => {
      if (evt.key !== STORAGE_KEY || !evt.newValue) return;
      try {
        const previousModel = model;
        const nextModel = normalizeModel(JSON.parse(evt.newValue));
        const changedTargets = changedDataSourceTargets(previousModel, nextModel);
        pruneRemovedStateDataDefaults(previousModel, nextModel, context);
        model = nextModel;
        context = { ...defaultContext(model), ...context };
        applyChangedStateDataContract(previousModel, nextModel, context);
        if (changedTargets.length) resetDataSourceContextTargets(changedTargets);
        suppressNextFocus = true;
        const entered = !findState(current);
        if (entered) {
          current = model.initial;
          syncRuntimeCurrent("storage", true);
          stateActivationId += 1;
        }
        runCurrentStateEntryEffects({ fetch: entered || currentDataSourceTargetChanged(changedTargets) });
        render();
      } catch (_) {}
    });



    document.addEventListener("keydown", evt => {
      const mod = evt.ctrlKey || evt.metaKey;
      if (!mod || evt.altKey) return;
      const key = evt.key.toLowerCase();
      if (key !== "s" && key !== "o" && key !== "n") return;
      const hasHost = hasHostWindow();
      if (!hasHost) return;
      evt.preventDefault();
      evt.stopImmediatePropagation();
      const action = key === "s" ? "save" : key === "o" ? "load" : evt.shiftKey ? "" : "new";
      if (!action) return;
      const payload = {
        type: "STATE_BLUEPRINT_SHORTCUT",
        action
      };
      postHostMessage(payload);
    }, { capture: true });

    normalizeModel(model);
    if (!findState(current)) current = model.initial;
    if (hasHostWindow()) {
      syncRuntimeAppName();
      const statePill = document.getElementById("statePill");
      if (statePill) statePill.textContent = "";
    } else {
      stateActivationId += 1;
      syncRuntimeCurrent("initial", true);
      runCurrentStateEntryEffects({ fetch: true });
      render();
    }
  </script>
</body>
</html>
